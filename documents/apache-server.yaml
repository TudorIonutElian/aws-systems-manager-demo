---
schemaVersion: '2.2'
description: This document installs Apache on the instance and deploys the React app from S3.
parameters:
  ArtifactBucket:
    type: "String"
    description: "S3 bucket containing the React app artifacts (dist-latest.tar.gz)."
mainSteps:
- action: aws:runShellScript
  name: configureApache
  inputs:
    runCommand:
    - 'sudo yum update -y'
    - 'sudo yum install -y httpd'
    - 'sudo systemctl start httpd'
    - 'sudo systemctl enable httpd'
    - 'sudo mkdir -p /var/www/cgi-bin'
    - |
      sudo bash -c 'cat > /var/www/cgi-bin/hostname << "EOF"
      #!/bin/bash
      echo "Content-Type: text/plain"
      echo ""
      hostname -f
      EOF'
    - 'sudo chmod +x /var/www/cgi-bin/hostname'
    - |
      sudo bash -c 'cat >> /etc/httpd/conf/httpd.conf << "EOF"

      # Enable CGI for hostname endpoint
      ScriptAlias /api/hostname /var/www/cgi-bin/hostname
      <Directory "/var/www/cgi-bin">
          AllowOverride None
          Options +ExecCGI
          Require all granted
      </Directory>
      EOF'

- action: aws:runShellScript
  name: deployReactApp
  inputs:
    runCommand:
    - 'echo "Starting deployment on $(hostname)..."'
    - 'aws s3 cp s3://{{ArtifactBucket}}/dist-latest.tar.gz /tmp/dist.tar.gz'
    - 'sudo rm -rf /var/www/html/*'
    - 'sudo tar -xzf /tmp/dist.tar.gz -C /var/www/html/'
    - 'sudo systemctl restart httpd'
    - 'echo "✅ Deployment complete on $(hostname)"'
