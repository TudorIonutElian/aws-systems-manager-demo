---
schemaVersion: '0.3'
description: Creates 2 t3.micro EC2 instances with SSM and installs httpd on them.
parameters:
  ImageId:
    type: "String"
    description: "AMI ID to use for the instances (Amazon Linux 2023)."
  SubnetId:
    type: "String"
    description: "Subnet ID where instances will be launched."
  SecurityGroupId:
    type: "String"
    description: "Security group ID to attach to the instances."
  IamInstanceProfile:
    type: "String"
    description: "IAM instance profile name for SSM access."
    default: "ec2_ssm_profile"
  KeyName:
    type: "String"
    description: "EC2 key pair name for SSH access."
    default: ""
  EnvironmentTag:
    type: "String"
    description: "Environment tag value for the instances."
    default: "SSM-Demo"

mainSteps:
- name: createInstance1
  action: aws:executeAwsApi
  inputs:
    Service: ec2
    Api: RunInstances
    ImageId: "{{ ImageId }}"
    InstanceType: "t3.micro"
    MinCount: 1
    MaxCount: 1
    SubnetId: "{{ SubnetId }}"
    SecurityGroupIds:
      - "{{ SecurityGroupId }}"
    IamInstanceProfile:
      Name: "{{ IamInstanceProfile }}"
    TagSpecifications:
      - ResourceType: "instance"
        Tags:
          - Key: "Name"
            Value: "SSM-HTTPD-Instance-1"
          - Key: "Environment"
            Value: "{{ EnvironmentTag }}"
          - Key: "ManagedBy"
            Value: "SSM-Automation"
  outputs:
    - Name: InstanceId1
      Selector: "$.Instances[0].InstanceId"
      Type: String

- name: createInstance2
  action: aws:executeAwsApi
  inputs:
    Service: ec2
    Api: RunInstances
    ImageId: "{{ ImageId }}"
    InstanceType: "t3.micro"
    MinCount: 1
    MaxCount: 1
    SubnetId: "{{ SubnetId }}"
    SecurityGroupIds:
      - "{{ SecurityGroupId }}"
    IamInstanceProfile:
      Name: "{{ IamInstanceProfile }}"
    TagSpecifications:
      - ResourceType: "instance"
        Tags:
          - Key: "Name"
            Value: "SSM-HTTPD-Instance-2"
          - Key: "Environment"
            Value: "{{ EnvironmentTag }}"
          - Key: "ManagedBy"
            Value: "SSM-Automation"
  outputs:
    - Name: InstanceId2
      Selector: "$.Instances[0].InstanceId"
      Type: String

- name: waitForInstance1
  action: aws:waitForAwsResourceProperty
  inputs:
    Service: ec2
    Api: DescribeInstanceStatus
    InstanceIds:
      - "{{ createInstance1.InstanceId1 }}"
    PropertySelector: "$.InstanceStatuses[0].InstanceStatus.Status"
    DesiredValues:
      - "ok"
  timeoutSeconds: 600

- name: waitForInstance2
  action: aws:waitForAwsResourceProperty
  inputs:
    Service: ec2
    Api: DescribeInstanceStatus
    InstanceIds:
      - "{{ createInstance2.InstanceId2 }}"
    PropertySelector: "$.InstanceStatuses[0].InstanceStatus.Status"
    DesiredValues:
      - "ok"
  timeoutSeconds: 600

- name: installHttpdOnBothInstances
  action: aws:runCommand
  inputs:
    DocumentName: "install_httpd"
    InstanceIds:
      - "{{ createInstance1.InstanceId1 }}"
      - "{{ createInstance2.InstanceId2 }}"
    MaxConcurrency: "2"
    TimeoutSeconds: 300
