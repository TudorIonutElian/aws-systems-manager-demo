---
schemaVersion: '0.3'
description: Discovers EC2 instances by tag and terminates them.
parameters:
  TagKey:
    type: "String"
    description: "The tag key to filter instances (e.g., Environment, Name, ManagedBy)."
  TagValue:
    type: "String"
    description: "The tag value to match (e.g., SSM-Demo, Development-42)."

mainSteps:
- name: getInstancesByTag
  action: aws:executeAwsApi
  inputs:
    Service: ec2
    Api: DescribeInstances
    Filters:
    - Name: "tag:{{ TagKey }}"
      Values:
        - "{{ TagValue }}"
    - Name: "instance-state-name"
      Values:
        - "running"
        - "stopped"
        - "stopping"
  outputs:
  - Name: InstanceIds
    Selector: "$.Reservations..Instances..InstanceId"
    Type: StringList

- name: terminateInstances
  action: aws:executeAwsApi
  inputs:
    Service: ec2
    Api: TerminateInstances
    InstanceIds: "{{ getInstancesByTag.InstanceIds }}"
  outputs:
  - Name: TerminatingInstances
    Selector: "$.TerminatingInstances"
    Type: MapList
