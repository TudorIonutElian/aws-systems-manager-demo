---
schemaVersion: '0.3'
description: Discovers all EC2 instances in the fleet by Environment tag, then authorizes port 80 ingress on their security group.
parameters:
  BuildNumber:
    type: "String"
    description: "The build number used as the Environment tag value (e.g. 42 -> Development-42)."
  SecurityGroupId:
    type: "String"
    description: "ID of the security group to authorize port 80 ingress to."
mainSteps:
- name: getFleetInstances
  action: aws:executeAwsApi
  inputs:
    Service: ec2
    Api: DescribeInstances
    Filters:
    - Name: "tag:Environment"
      Values:
        - "Development-{{ BuildNumber }}"
    - Name: "instance-state-name"
      Values:
        - "running"
  outputs:
  - Name: InstanceIds
    Selector: "$.Reservations..Instances..InstanceId"
    Type: StringList

- name: authorizePort80Ingress
  action: aws:executeAwsApi
  inputs:
    Service: ec2
    Api: AuthorizeSecurityGroupIngress
    GroupId: "{{ SecurityGroupId }}"
    IpPermissions:
    - IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      IpRanges:
      - CidrIp: "0.0.0.0/0"
