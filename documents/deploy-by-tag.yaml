---
schemaVersion: '0.3'
description: Discovers EC2 instances by tag and deploys the React app from S3 to all of them.
parameters:
  TagKey:
    type: "String"
    description: "The tag key to filter instances (e.g., Environment, Name, Application)."
  TagValue:
    type: "String"
    description: "The tag value to match (e.g., SSM-Demo, Production, Development-42)."
  ArtifactBucket:
    type: "String"
    description: "S3 bucket containing the React app artifacts (dist-latest.tar.gz)."

mainSteps:
- name: getInstancesByTag
  action: aws:executeAwsApi
  inputs:
    Service: ec2
    Api: DescribeInstances
    Filters:
    - Name: "tag:{{ TagKey }}"
      Values:
        - "{{ TagValue }}"
    - Name: "instance-state-name"
      Values:
        - "running"
  outputs:
  - Name: InstanceIds
    Selector: "$.Reservations..Instances..InstanceId"
    Type: StringList

- name: deployReactApp
  action: aws:runCommand
  inputs:
    DocumentName: "apache_document"
    InstanceIds: "{{ getInstancesByTag.InstanceIds }}"
    Parameters:
      ArtifactBucket: "{{ ArtifactBucket }}"
    MaxConcurrency: "10"
    TimeoutSeconds: 300
