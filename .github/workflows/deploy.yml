name: DEMO - Deploy Infrastructure

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  TF_VAR_build_number: ${{ github.run_number }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Terraform ────────────────────────────────────────────────────────────

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get Terraform outputs
        id: tf
        run: |
          echo "artifact_bucket=$(terraform output -raw artifact_bucket_name)" >> $GITHUB_OUTPUT
          echo "security_group_id=$(terraform output -raw security_group_id)" >> $GITHUB_OUTPUT
          terraform output -json instance_ids >> instance_ids.json

      - name: Save build number and SG ID as repo variables
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          REPO=${{ github.repository }}
          SG_ID=${{ steps.tf.outputs.security_group_id }}
          BUILD_NUMBER=${{ github.run_number }}

          # Function to create or update a variable
          set_variable() {
            local name=$1
            local value=$2

            if gh api /repos/$REPO/actions/variables/$name &>/dev/null; then
              echo "Updating $name to: $value"
              gh api --method PATCH /repos/$REPO/actions/variables/$name -f name="$name" -f value="$value"
            else
              echo "Creating $name with value: $value"
              gh api --method POST /repos/$REPO/actions/variables -f name="$name" -f value="$value"
            fi
          }

          BUCKET=${{ steps.tf.outputs.artifact_bucket }}

          set_variable "DEPLOY_BUILD_NUMBER" "$BUILD_NUMBER"
          set_variable "DEPLOY_SECURITY_GROUP_ID" "$SG_ID"
          set_variable "DEPLOY_BUCKET" "$BUCKET"

      # ── React build ──────────────────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build React app
        working-directory: web
        run: npm run build

      - name: Upload build to S3
        run: |
          tar -czf dist.tar.gz -C web/dist .
          aws s3 cp dist.tar.gz s3://${{ steps.tf.outputs.artifact_bucket }}/dist-${{ github.run_number }}.tar.gz
          aws s3 cp dist.tar.gz s3://${{ steps.tf.outputs.artifact_bucket }}/dist-latest.tar.gz

      # ── Deploy via SSM ───────────────────────────────────────────────────────

      - name: Wait for instances to register with SSM
        run: |
          echo "Waiting for all instances to register with SSM..."
          REGION=${{ env.AWS_REGION }}
          INSTANCE_IDS=$(jq -r '.[]' instance_ids.json)

          ALL_ONLINE=true
          for ID in $INSTANCE_IDS; do
            echo "Checking $ID..."
            ONLINE=false

            for i in $(seq 1 60); do
              STATUS=$(aws ssm describe-instance-information \
                --filters "Key=InstanceIds,Values=$ID" \
                --region "$REGION" \
                --query "InstanceInformationList[0].PingStatus" \
                --output text 2>/dev/null || echo "NotFound")

              if [[ "$STATUS" == "Online" ]]; then
                echo "  ✅ $ID is registered and online"
                ONLINE=true
                break
              fi

              if [[ $i -eq 1 ]] || [[ $((i % 6)) -eq 0 ]]; then
                echo "  [$i/60] Status: $STATUS - waiting..."
              fi
              sleep 10
            done

            if [[ "$ONLINE" == "false" ]]; then
              echo "  ⚠️ Warning: $ID did not register within 10 minutes"
              ALL_ONLINE=false
            fi
          done

          if [[ "$ALL_ONLINE" == "false" ]]; then
            echo ""
            echo "⚠️  Some instances did not register with SSM in time."
            echo "This may be due to slow boot times or SSM agent issues."
            echo "Continuing anyway - command will target available instances only."
          fi

      - name: Deploy React app via SSM
        run: |
          BUCKET=${{ steps.tf.outputs.artifact_bucket }}
          REGION=${{ env.AWS_REGION }}
          INSTANCE_IDS=$(jq -r '.[]' instance_ids.json)

          echo "Deploying to instances: $(echo $INSTANCE_IDS | tr '\n' ' ')"

          # Send command using apache_document SSM document
          COMMAND_ID=$(aws ssm send-command \
            --document-name "apache_document" \
            --instance-ids $INSTANCE_IDS \
            --max-concurrency "10" \
            --timeout-seconds 300 \
            --parameters "ArtifactBucket=$BUCKET" \
            --region "$REGION" \
            --query "Command.CommandId" \
            --output text)

          echo ""
          echo "SSM Command ID: $COMMAND_ID"
          echo ""

          # Wait for command completion
          for i in $(seq 1 45); do
            RESPONSE=$(aws ssm list-commands \
              --command-id "$COMMAND_ID" \
              --region "$REGION" \
              --query "Commands[0].[Status,TargetCount,CompletedCount,ErrorCount]" \
              --output text)

            read -r STATUS TARGET_COUNT COMPLETED_COUNT ERROR_COUNT <<< "$RESPONSE"

            echo "  [$i/45] Status: $STATUS | Completed: $COMPLETED_COUNT/$TARGET_COUNT | Errors: $ERROR_COUNT"

            if [[ "$STATUS" == "Success" ]]; then
              echo ""
              echo "✅ Deployment successful on all $TARGET_COUNT instances!"
              break
            elif [[ "$STATUS" == "Failed" ]]; then
              echo ""
              echo "❌ Deployment failed. Showing command invocation details:"
              aws ssm list-command-invocations \
                --command-id "$COMMAND_ID" \
                --region "$REGION" \
                --details \
                --query "CommandInvocations[*].[InstanceId,Status,StatusDetails]" \
                --output table
              exit 1
            fi

            sleep 10
          done

          if [[ "$STATUS" != "Success" ]]; then
            echo "⚠️ Deployment timed out. Status: $STATUS"
            exit 1
          fi

      - name: Print website URLs
        run: terraform output -json website_urls | jq -r '.[]'
