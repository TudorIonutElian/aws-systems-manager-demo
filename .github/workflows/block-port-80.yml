name: DEMO - Block Port 80

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1

jobs:
  block-port-80:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start SSM Automation
        id: ssm
        run: |
          EXECUTION_ID=$(aws ssm start-automation-execution \
            --document-name "block_port_80" \
            --parameters "BuildNumber=${{ vars.DEPLOY_BUILD_NUMBER }},SecurityGroupId=${{ vars.DEPLOY_SECURITY_GROUP_ID }}" \
            --region ${{ env.AWS_REGION }} \
            --query "AutomationExecutionId" \
            --output text)
          echo "execution_id=$EXECUTION_ID" >> $GITHUB_OUTPUT
          echo "Automation execution started: $EXECUTION_ID"

      - name: Wait for automation to complete
        run: |
          EXECUTION_ID=${{ steps.ssm.outputs.execution_id }}
          for i in $(seq 1 20); do
            STATUS=$(aws ssm get-automation-execution \
              --automation-execution-id "$EXECUTION_ID" \
              --region ${{ env.AWS_REGION }} \
              --query "AutomationExecution.AutomationExecutionStatus" \
              --output text)
            echo "[$i/20] Status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              echo "Port 80 successfully blocked."
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo "Automation failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for automation to complete."
          exit 1
