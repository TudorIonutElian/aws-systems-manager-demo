name: DEMO - Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm'
        required: true
        type: string

env:
  AWS_REGION: eu-central-1
  TF_VAR_build_number: "0"

jobs:
  destroy:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "destroy" ]; then
            echo "::error::You must type 'destroy' to confirm infrastructure destruction"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Terraform ────────────────────────────────────────────────────────────

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Get artifact bucket name before destroy
        id: tf-outputs
        run: |
          echo "artifact_bucket=$(terraform output -raw artifact_bucket_name 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Empty S3 bucket before destroy
        if: steps.tf-outputs.outputs.artifact_bucket != ''
        run: |
          BUCKET="${{ steps.tf-outputs.outputs.artifact_bucket }}"
          echo "Emptying S3 bucket: $BUCKET"
          aws s3 rm s3://$BUCKET --recursive || true
        continue-on-error: true

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Clean up repository variables
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          REPO=${{ github.repository }}

          gh api --method DELETE /repos/$REPO/actions/variables/DEPLOY_BUILD_NUMBER 2>/dev/null || true
          gh api --method DELETE /repos/$REPO/actions/variables/DEPLOY_SECURITY_GROUP_ID 2>/dev/null || true

          echo "Infrastructure destroyed successfully"
        continue-on-error: true
