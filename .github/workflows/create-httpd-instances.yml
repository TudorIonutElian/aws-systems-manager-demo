name: DEMO - Create HTTPD Instances

on:
  workflow_dispatch:
    inputs:
      image_id:
        description: 'AMI ID for Amazon Linux 2023'
        required: true
        type: string
      subnet_id:
        description: 'Subnet ID for instance placement'
        required: true
        type: string
      security_group_id:
        description: 'Security Group ID to attach (optional, uses default if not provided)'
        required: false
        type: string
      environment_tag:
        description: 'Environment tag value'
        required: false
        default: 'SSM-Demo'
        type: string

env:
  AWS_REGION: eu-central-1

jobs:
  create-instances:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get default security group if not provided
        id: sg
        run: |
          if [ -z "${{ inputs.security_group_id }}" ]; then
            echo "No security group provided, fetching default security group..."

            # Get VPC ID from the subnet
            VPC_ID=$(aws ec2 describe-subnets \
              --subnet-ids ${{ inputs.subnet_id }} \
              --region ${{ env.AWS_REGION }} \
              --query "Subnets[0].VpcId" \
              --output text)

            echo "VPC ID: $VPC_ID"

            # Get default security group for the VPC
            SG_ID=$(aws ec2 describe-security-groups \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=default" \
              --region ${{ env.AWS_REGION }} \
              --query "SecurityGroups[0].GroupId" \
              --output text)

            echo "Using default security group: $SG_ID"
            echo "security_group_id=$SG_ID" >> $GITHUB_OUTPUT
          else
            echo "Using provided security group: ${{ inputs.security_group_id }}"
            echo "security_group_id=${{ inputs.security_group_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Start SSM Automation
        id: ssm
        run: |
          EXECUTION_ID=$(aws ssm start-automation-execution \
            --document-name "create_httpd_instances" \
            --parameters "ImageId=${{ inputs.image_id }},SubnetId=${{ inputs.subnet_id }},SecurityGroupId=${{ steps.sg.outputs.security_group_id }},EnvironmentTag=${{ inputs.environment_tag }}" \
            --region ${{ env.AWS_REGION }} \
            --query "AutomationExecutionId" \
            --output text)
          echo "execution_id=$EXECUTION_ID" >> $GITHUB_OUTPUT
          echo "Automation execution started: $EXECUTION_ID"

      - name: Wait for automation to complete
        run: |
          EXECUTION_ID=${{ steps.ssm.outputs.execution_id }}
          for i in $(seq 1 40); do
            STATUS=$(aws ssm get-automation-execution \
              --automation-execution-id "$EXECUTION_ID" \
              --region ${{ env.AWS_REGION }} \
              --query "AutomationExecution.AutomationExecutionStatus" \
              --output text)
            echo "[$i/40] Status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              echo ""
              echo "✅ Instances created and httpd installed successfully!"

              # Get the created instance IDs
              INSTANCE_1=$(aws ssm get-automation-execution \
                --automation-execution-id "$EXECUTION_ID" \
                --region ${{ env.AWS_REGION }} \
                --query 'AutomationExecution.Outputs."createInstance1.InstanceId1"[0]' \
                --output text)

              INSTANCE_2=$(aws ssm get-automation-execution \
                --automation-execution-id "$EXECUTION_ID" \
                --region ${{ env.AWS_REGION }} \
                --query 'AutomationExecution.Outputs."createInstance2.InstanceId2"[0]' \
                --output text)

              echo ""
              echo "Created instances:"
              echo "  Instance 1: $INSTANCE_1"
              echo "  Instance 2: $INSTANCE_2"

              # Get public IPs
              echo ""
              echo "Public URLs:"
              aws ec2 describe-instances \
                --instance-ids "$INSTANCE_1" "$INSTANCE_2" \
                --region ${{ env.AWS_REGION }} \
                --query "Reservations[].Instances[].[Tags[?Key=='Name'].Value|[0],PublicIpAddress]" \
                --output text | while read -r name ip; do
                  echo "  http://$ip - $name"
                done

              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo ""
              echo "❌ Automation failed with status: $STATUS"

              # Show failure details
              aws ssm get-automation-execution \
                --automation-execution-id "$EXECUTION_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "AutomationExecution.FailureMessage" \
                --output text

              exit 1
            fi
            sleep 15
          done
          echo ""
          echo "⚠️ Timed out waiting for automation to complete."
          exit 1
