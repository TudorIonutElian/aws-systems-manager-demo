name: Destroy Instances by Tag

on:
  workflow_dispatch:
    inputs:
      tag_key:
        description: 'Tag key to filter instances (e.g., Environment, ManagedBy)'
        required: true
        type: string
        default: 'ManagedBy'
      tag_value:
        description: 'Tag value to match (e.g., SSM-Automation, SSM-Demo)'
        required: true
        type: string
      confirm_destroy:
        description: 'Type "DESTROY" to confirm instance termination'
        required: true
        type: string

env:
  AWS_REGION: eu-central-1

jobs:
  destroy-by-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed. You must type 'DESTROY' to proceed."
            echo "Provided: '${{ inputs.confirm_destroy }}'"
            exit 1
          fi
          echo "✅ Confirmation validated"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Preview instances to be terminated
        id: preview
        run: |
          echo "Searching for instances with tag: ${{ inputs.tag_key }}=${{ inputs.tag_value }}"
          echo ""

          INSTANCES=$(aws ec2 describe-instances \
            --filters "Name=tag:${{ inputs.tag_key }},Values=${{ inputs.tag_value }}" \
                      "Name=instance-state-name,Values=running,stopped,stopping" \
            --region ${{ env.AWS_REGION }} \
            --query "Reservations[].Instances[].[InstanceId,State.Name,Tags[?Key=='Name'].Value|[0]]" \
            --output text)

          if [ -z "$INSTANCES" ]; then
            echo "⚠️  No instances found with tag: ${{ inputs.tag_key }}=${{ inputs.tag_value }}"
            echo "has_instances=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "The following instances will be TERMINATED:"
          echo ""
          echo "$INSTANCES" | while read -r id state name; do
            echo "  🔴 $id ($state) - $name"
          done

          INSTANCE_COUNT=$(echo "$INSTANCES" | wc -l)
          echo ""
          echo "Total: $INSTANCE_COUNT instance(s)"
          echo "has_instances=true" >> $GITHUB_OUTPUT

      - name: Start SSM Automation
        if: steps.preview.outputs.has_instances == 'true'
        id: ssm
        run: |
          EXECUTION_ID=$(aws ssm start-automation-execution \
            --document-name "destroy_by_tag" \
            --parameters "TagKey=${{ inputs.tag_key }},TagValue=${{ inputs.tag_value }}" \
            --region ${{ env.AWS_REGION }} \
            --query "AutomationExecutionId" \
            --output text)
          echo "execution_id=$EXECUTION_ID" >> $GITHUB_OUTPUT
          echo ""
          echo "Automation execution started: $EXECUTION_ID"

      - name: Wait for automation to complete
        if: steps.preview.outputs.has_instances == 'true'
        run: |
          EXECUTION_ID=${{ steps.ssm.outputs.execution_id }}
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-automation-execution \
              --automation-execution-id "$EXECUTION_ID" \
              --region ${{ env.AWS_REGION }} \
              --query "AutomationExecution.AutomationExecutionStatus" \
              --output text)
            echo "[$i/30] Status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              echo ""
              echo "✅ Instances terminated successfully!"

              # Get terminated instance details
              INSTANCE_IDS=$(aws ssm get-automation-execution \
                --automation-execution-id "$EXECUTION_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "AutomationExecution.Outputs.'getInstancesByTag.InstanceIds'[0]" \
                --output text)

              echo ""
              echo "Terminated instances:"
              echo "$INSTANCE_IDS" | tr ',' '\n' | while read -r id; do
                echo "  🗑️  $id"
              done

              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo ""
              echo "❌ Automation failed with status: $STATUS"

              # Show failure details
              aws ssm get-automation-execution \
                --automation-execution-id "$EXECUTION_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "AutomationExecution.FailureMessage" \
                --output text

              exit 1
            fi
            sleep 10
          done
          echo ""
          echo "⚠️ Timed out waiting for automation to complete."
          exit 1
