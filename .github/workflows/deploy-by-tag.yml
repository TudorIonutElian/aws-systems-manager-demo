name: Deploy React App by Tag

on:
  workflow_dispatch:
    inputs:
      tag_key:
        description: 'Tag key to filter instances (e.g., Environment, Name)'
        required: true
        type: string
        default: 'Environment'
      tag_value:
        description: 'Tag value to match (e.g., SSM-Demo, Development-42)'
        required: true
        type: string
      artifact_bucket:
        description: 'S3 bucket with React artifacts (optional, uses DEPLOY_BUCKET if not provided)'
        required: false
        type: string

env:
  AWS_REGION: eu-central-1

jobs:
  deploy-by-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine artifact bucket
        id: bucket
        run: |
          if [ -n "${{ inputs.artifact_bucket }}" ]; then
            echo "Using provided bucket: ${{ inputs.artifact_bucket }}"
            echo "bucket_name=${{ inputs.artifact_bucket }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ vars.DEPLOY_BUCKET }}" ]; then
            echo "Using saved bucket from repo variables: ${{ vars.DEPLOY_BUCKET }}"
            echo "bucket_name=${{ vars.DEPLOY_BUCKET }}" >> $GITHUB_OUTPUT
          else
            echo "❌ Error: No artifact bucket provided and DEPLOY_BUCKET variable not set."
            echo "Either provide artifact_bucket input or ensure the deploy workflow has run at least once."
            exit 1
          fi

      - name: Start SSM Automation
        id: ssm
        run: |
          EXECUTION_ID=$(aws ssm start-automation-execution \
            --document-name "deploy_by_tag" \
            --parameters "TagKey=${{ inputs.tag_key }},TagValue=${{ inputs.tag_value }},ArtifactBucket=${{ steps.bucket.outputs.bucket_name }}" \
            --region ${{ env.AWS_REGION }} \
            --query "AutomationExecutionId" \
            --output text)
          echo "execution_id=$EXECUTION_ID" >> $GITHUB_OUTPUT
          echo "Automation execution started: $EXECUTION_ID"
          echo ""
          echo "Deploying to instances with tag: ${{ inputs.tag_key }}=${{ inputs.tag_value }}"

      - name: Wait for automation to complete
        run: |
          EXECUTION_ID=${{ steps.ssm.outputs.execution_id }}
          for i in $(seq 1 40); do
            STATUS=$(aws ssm get-automation-execution \
              --automation-execution-id "$EXECUTION_ID" \
              --region ${{ env.AWS_REGION }} \
              --query "AutomationExecution.AutomationExecutionStatus" \
              --output text)
            echo "[$i/40] Status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              echo ""
              echo "✅ React app deployed successfully!"

              # Get the instance IDs that were targeted
              INSTANCE_IDS=$(aws ssm get-automation-execution \
                --automation-execution-id "$EXECUTION_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "AutomationExecution.Outputs.'getInstancesByTag.InstanceIds'[0]" \
                --output text)

              INSTANCE_COUNT=$(echo "$INSTANCE_IDS" | tr ',' '\n' | wc -l)
              echo "Deployed to $INSTANCE_COUNT instance(s):"
              echo "$INSTANCE_IDS" | tr ',' '\n' | while read -r id; do
                echo "  - $id"
              done

              # Get command details
              COMMAND_ID=$(aws ssm get-automation-execution \
                --automation-execution-id "$EXECUTION_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "AutomationExecution.StepExecutions[?StepName=='deployReactApp'].Outputs.CommandId" \
                --output text | tr -d '[]"')

              echo ""
              echo "SSM Command ID: $COMMAND_ID"

              # Show command status
              aws ssm list-command-invocations \
                --command-id "$COMMAND_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "CommandInvocations[].[InstanceId,Status]" \
                --output table

              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo ""
              echo "❌ Automation failed with status: $STATUS"

              # Show failure details
              aws ssm get-automation-execution \
                --automation-execution-id "$EXECUTION_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "AutomationExecution.FailureMessage" \
                --output text

              exit 1
            fi
            sleep 10
          done
          echo ""
          echo "⚠️ Timed out waiting for automation to complete."
          exit 1
